     Añadir justo antes del </body> de la_elegida.html

     ════════════════════════════════════════════ -->

<style>
  #opinion-bubble {
    position: fixed;
    bottom: 100px;          /* encima del nav-dock */
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    z-index: 999;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.6s cubic-bezier(0.2,1,0.3,1),
                transform 0.6s cubic-bezier(0.2,1,0.3,1);
  }

  #opinion-bubble.visible {
    opacity: 1;
    pointer-events: auto;
    transform: translateX(-50%) translateY(0);
  }

  #opinion-bubble.hidden {
    opacity: 0;
    pointer-events: none;
    transform: translateX(-50%) translateY(10px);
  }

  .opinion-btn {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 22px 12px 16px;
    background: rgba(10, 10, 12, 0.75);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(0, 240, 255, 0.35);
    border-radius: 100px;
    color: #fff;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    text-decoration: none;
    cursor: pointer;
    white-space: nowrap;
    box-shadow: 0 0 24px rgba(0,240,255,0.12),
                0 4px 16px rgba(0,0,0,0.4);
    animation: bubble-pulse 3s ease-in-out infinite;
    transition: background 0.3s, border-color 0.3s, box-shadow 0.3s;
  }

  .opinion-btn:hover {
    background: rgba(0,71,255,0.2);
    border-color: rgba(0,240,255,0.7);
    box-shadow: 0 0 36px rgba(0,240,255,0.25), 0 4px 20px rgba(0,0,0,0.5);
    animation: none;
  }

  .opinion-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--cyan, #00f0ff);
    animation: dot-blink 2s ease-in-out infinite;
    flex-shrink: 0;
  }

  @keyframes bubble-pulse {
    0%, 100% { box-shadow: 0 0 20px rgba(0,240,255,0.1), 0 4px 16px rgba(0,0,0,0.4); }
    50%       { box-shadow: 0 0 32px rgba(0,240,255,0.25), 0 4px 16px rgba(0,0,0,0.4); }
  }

  @keyframes dot-blink {
    0%, 100% { opacity: 1; transform: scale(1); }
    50%       { opacity: 0.4; transform: scale(0.7); }
  }

  .opinion-close {
    background: none;
    border: none;
    color: rgba(255,255,255,0.35);
    font-size: 1rem;
    cursor: pointer;
    padding: 0 0 0 6px;
    line-height: 1;
    transition: color 0.2s;
  }
  .opinion-close:hover { color: rgba(255,255,255,0.8); }
</style>

<div id="opinion-bubble">
  <div style="display:flex; align-items:center; gap:8px;">
    <a
      href="https://portegag2.github.io/100-1/formulario-opinion.html"
      target="_blank"
      rel="noopener"
      class="opinion-btn"
    >
      <span class="opinion-dot"></span>
      porfi, danos tu opinión
    </a>
    <button class="opinion-close" id="opinion-close-btn" title="Cerrar">✕</button>
  </div>
</div>

<script>
  (function() {
    const bubble = document.getElementById('opinion-bubble');
    const closeBtn = document.getElementById('opinion-close-btn');

    // Aparece tras 6 segundos
    const showTimer = setTimeout(() => {
      bubble.classList.add('visible');
    }, 6000);

    // Cerrar
    closeBtn.addEventListener('click', () => {
      bubble.classList.remove('visible');
      bubble.classList.add('hidden');
    });
  })();
</script>
