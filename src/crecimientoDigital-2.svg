<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="gradSincronia" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0047ff;stop-opacity:1" />
    </radialGradient>
    
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <circle cx="100" cy="100" r="60" stroke="rgba(255,255,255,0.05)" stroke-width="0.5" fill="none" />
  <circle cx="100" cy="100" r="40" stroke="rgba(255,255,255,0.05)" stroke-width="0.5" fill="none" />

  <path d="M100 30 A70 70 0 1 1 99.9 30"
        stroke="url(#gradSincronia)"
        stroke-width="1.5"
        fill="none"
        stroke-dasharray="10, 150"
        stroke-linecap="round"
        filter="url(#softGlow)">
    <animateTransform 
      attributeName="transform"
      type="rotate"
      from="0 100 100"
      to="360 100 100"
      dur="10s"
      repeatCount="indefinite" />
  </path>

  <g filter="url(#softGlow)">
    <circle cx="100" cy="100" r="12" fill="none" stroke="#00f0ff" stroke-width="0.5" stroke-dasharray="2,2" />
    <circle cx="100" cy="100" r="6" fill="#0047ff">
      <animate attributeName="r" values="5;7;5" dur="3s" repeatCount="indefinite" />
    </circle>
  </g>

  <line x1="100" y1="100" x2="150" y2="50" stroke="rgba(255,255,255,0.2)" stroke-width="0.5" />
  <circle cx="150" cy="50" r="2" fill="white" fill-opacity="0.5" />
  
  <line x1="100" y1="100" x2="50" y2="150" stroke="rgba(255,255,255,0.2)" stroke-width="0.5" />
  <circle cx="50" cy="150" r="2" fill="white" fill-opacity="0.5" />
</svg>