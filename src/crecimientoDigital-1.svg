<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="gradConvergencia" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#0047ff;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#00f0ff;stop-opacity:1" />
        </linearGradient>

        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
    </defs>

    <path d="M40 160 Q100 100 160 160" stroke="rgba(255,255,255,0.1)" stroke-width="0.5" fill="none" />
    <path d="M40 40 Q100 100 160 40" stroke="rgba(255,255,255,0.1)" stroke-width="0.5" fill="none" />

    <path d="M20 100 
             C 60 20, 140 180, 180 100"
          stroke="url(#gradConvergencia)"
          stroke-width="2.5"
          fill="none"
          stroke-linecap="round"
          filter="url(#glow)">
        <animate attributeName="stroke-dasharray" from="0, 500" to="500, 0" dur="3s" fill="freeze" />
    </path>

    <circle cx="100" cy="100" r="4" fill="#00f0ff">
        <animate attributeName="r" values="3;5;3" dur="4s" repeatCount="indefinite" />
        <animate attributeName="opacity" values="0.5;1;0.5" dur="4s" repeatCount="indefinite" />
    </circle>

    <rect x="90" y="90" width="20" height="20" rx="2"
          stroke="white" stroke-opacity="0.2" fill="none"
          transform="rotate(45 100 100)" />
</svg>